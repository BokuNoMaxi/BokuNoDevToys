services:
  devtoys:
    container_name: devtoys
    build: .
    ports:
      - "34291:80"
    restart: unless-stopped
    volumes:
      - ./build:/usr/share/nginx/html:ro

  builder:
    image: node:20-alpine
    container_name: devtoys-builder
    working_dir: /app
    volumes:
      - .:/app
      - devtoys_node_modules:/app/node_modules
    profiles:
      - build

volumes:
  devtoys_node_modules:
